<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="関西エリアの犬連れお出かけスポットを現在地から近い順に探せるサイト。大阪・京都・兵庫・奈良の犬OKな公園や散歩スポット情報。">
  <title>犬阪んさい - 関西の犬連れお出かけスポット検索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="main-content">
    <section class="hero">
      <h1>関西の犬連れスポットを探そう</h1>
      <p>現在地から近い順に、犬と一緒に行けるお出かけスポットが見つかります</p>
    </section>

    <section class="gps-section">
      <button class="btn-gps" id="btnGps">
        現在地から探す
      </button>
      <p class="gps-status" id="gpsStatus"></p>
    </section>

    <section class="pref-section" id="prefSection">
    </section>

    <div class="ad-slot">広告スペース</div>

    <p class="spot-count" id="spotCount"></p>

    <div class="spot-list" id="spotList">
      <div class="loading-spinner">読み込み中...</div>
    </div>

    <div class="ad-slot">広告スペース</div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
